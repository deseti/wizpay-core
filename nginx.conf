events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Upstream services ────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4000;
    }

    # ── Main server block (HTTP) ─────────────────────────────────────────
    # For SSL, duplicate this block with listen 443 ssl; and certificate paths.
    # Then redirect port 80 to 443.
    server {
        listen 80;
        server_name _;

        # ── Landing page (static files) ────────────────────────────────
        # Uncomment and adjust if you want the landing page at the root:
        # location / {
        #     root /usr/share/nginx/landing;
        #     index index.html;
        #     try_files $uri $uri/ /index.html;
        # }

        # ── Frontend (Next.js app) ─────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Frontend Next.js route used as a same-origin Circle proxy fallback.
        # Keep this ahead of the generic backend /api/ proxy.
        location = /api/circle/proxy {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend API ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend tasks (direct NestJS routes) ───────────────────────
        location /tasks {
            proxy_pass http://backend/tasks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /wallets {
            proxy_pass http://backend/wallets;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /treasury {
            proxy_pass http://backend/treasury;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── SSL server block (uncomment when certs are ready) ────────────────
    # server {
    #     listen 443 ssl;
    #     server_name wizpay.yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/wizpay.yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/wizpay.yourdomain.com/privkey.pem;
    #
    #     # Copy all location blocks from the HTTP server above
    # }
    #
    # server {
    #     listen 80;
    #     server_name wizpay.yourdomain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
