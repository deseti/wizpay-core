# ============================================================================
# Docker Compose — Production overrides
# ============================================================================

services:
  nginx:
    image: nginx:alpine
    container_name: wizpay-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - wizpay-network

  frontend:
    ports:
      - "127.0.0.1:3000:3000"

  backend:
    ports:
      - "127.0.0.1:4000:4000"
