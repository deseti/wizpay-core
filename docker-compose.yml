services:
  backend:
    build: ./apps/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://wizpay:wizpay@postgres:5432/wizpay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOCKER: "true"
    ports:
      - "4000:4000"
    networks:
      - wizpay-network

  redis:
    image: redis:7-alpine
    container_name: wizpay-redis
    ports:
      - "6379:6379"
    networks:
      - wizpay-network

  frontend:
    build:
      context: ./apps/frontend
      args:
        DOCKER_BUILD: "true"
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${NEXT_PUBLIC_CONTRACT_ADDRESS}
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:4000
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-${RPC_URL}}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-${RPC_URL}}
    env_file: .env
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:4000
    ports:
      - "3000:3000"
    networks:
      - wizpay-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: wizpay
      POSTGRES_PASSWORD: wizpay
      POSTGRES_DB: wizpay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wizpay -d wizpay"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wizpay-network

networks:
  wizpay-network:
    driver: bridge

volumes:
  postgres_data: