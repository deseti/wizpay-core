services:
  backend:
    build: ./apps/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://wizpay:wizpay@postgres:5432/wizpay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOCKER: "true"
      # ── Circle API ────────────────────────────────────────────────────────
      CIRCLE_API_KEY: ${CIRCLE_API_KEY}
      CIRCLE_BASE_URL: ${CIRCLE_BASE_URL}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET}
      CIRCLE_WALLETS_BASE_URL: ${CIRCLE_WALLETS_BASE_URL}
      CIRCLE_TRANSFER_BLOCKCHAIN: ${CIRCLE_TRANSFER_BLOCKCHAIN}
      CIRCLE_TRANSFER_FEE_LEVEL: ${CIRCLE_TRANSFER_FEE_LEVEL}
      # ── Circle Wallets ────────────────────────────────────────────────────
      CIRCLE_WALLET_ID_ARC: ${CIRCLE_WALLET_ID_ARC}
      CIRCLE_WALLET_ID_SEPOLIA: ${CIRCLE_WALLET_ID_SEPOLIA}
      CIRCLE_WALLET_SET_ID_ARC: ${CIRCLE_WALLET_SET_ID_ARC}
      CIRCLE_WALLET_SET_ID_SEPOLIA: ${CIRCLE_WALLET_SET_ID_SEPOLIA}
      CIRCLE_WALLET_ADDRESS_ARC: ${CIRCLE_WALLET_ADDRESS_ARC}
      CIRCLE_WALLET_ADDRESS_SEPOLIA: ${CIRCLE_WALLET_ADDRESS_SEPOLIA}
    ports:
      - "4000:4000"
    networks:
      - wizpay-network

  redis:
    image: redis:7-alpine
    container_name: wizpay-redis
    ports:
      - "6379:6379"
    networks:
      - wizpay-network

  frontend:
    build:
      context: ./apps/frontend
      # ── Build-time args ───────────────────────────────────────────────────
      # docker-compose auto-loads the root .env file, so ${VAR} here resolves
      # from .env without any shell export. Values are baked into the Next.js
      # bundle during `npm run build` in the Dockerfile builder stage.
      #
      # To change a value: edit root .env, then rebuild with:
      #   docker compose down && docker compose up --build
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BACKEND_API_BASE_URL: ${NEXT_PUBLIC_BACKEND_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_CIRCLE_APP_ID: ${NEXT_PUBLIC_CIRCLE_APP_ID}
        NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY}
        NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL}
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL}
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      # ── Server-side runtime vars (Next.js API routes, not bundled) ──────────
      # IMPORTANT: Add http://localhost:3000 to Circle Console → Allowed Origins
      CIRCLE_API_KEY: ${CIRCLE_API_KEY}
      CIRCLE_BASE_URL: ${CIRCLE_BASE_URL}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET}
      CIRCLE_WALLETS_BASE_URL: ${CIRCLE_WALLETS_BASE_URL}
      CIRCLE_TRANSFER_BLOCKCHAIN: ${CIRCLE_TRANSFER_BLOCKCHAIN}
      CIRCLE_TRANSFER_FEE_LEVEL: ${CIRCLE_TRANSFER_FEE_LEVEL}
      CIRCLE_BRIDGE_TRANSFER_SPEED: ${CIRCLE_BRIDGE_TRANSFER_SPEED}
      CIRCLE_BRIDGE_TRANSFER_TTL_SECONDS: ${CIRCLE_BRIDGE_TRANSFER_TTL_SECONDS:-1800}
      CIRCLE_WALLET_ID_ARC: ${CIRCLE_WALLET_ID_ARC}
      CIRCLE_WALLET_ID_SEPOLIA: ${CIRCLE_WALLET_ID_SEPOLIA}
      CIRCLE_WALLET_SET_ID_ARC: ${CIRCLE_WALLET_SET_ID_ARC}
      CIRCLE_WALLET_SET_ID_SEPOLIA: ${CIRCLE_WALLET_SET_ID_SEPOLIA}
      CIRCLE_WALLET_ADDRESS_ARC: ${CIRCLE_WALLET_ADDRESS_ARC}
      CIRCLE_WALLET_ADDRESS_SEPOLIA: ${CIRCLE_WALLET_ADDRESS_SEPOLIA}
      BRIDGE_DATABASE_URL: ${DATABASE_URL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    ports:
      - "3000:3000"
    networks:
      - wizpay-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: wizpay
      POSTGRES_PASSWORD: wizpay
      POSTGRES_DB: wizpay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wizpay -d wizpay"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wizpay-network

networks:
  wizpay-network:
    driver: bridge

volumes:
  postgres_data: