services:
  backend:
    build: ./apps/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-wizpay}:${POSTGRES_PASSWORD:-wizpay}@postgres:5432/${POSTGRES_DB:-wizpay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOCKER: "true"
      # ── CORS ─────────────────────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      # ── Chain / RPC config ───────────────────────────────────────────────
      RPC_URL: ${RPC_URL:-}
      ARC_RPC_URL: ${ARC_RPC_URL:-}
      CHAIN_ID: ${CHAIN_ID:-5042002}
      ETH_SEPOLIA_RPC_URL: ${ETH_SEPOLIA_RPC_URL:-}
      NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-}
      NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL:-}
      SOLANA_DEVNET_RPC_URL: ${SOLANA_DEVNET_RPC_URL:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      SOLANA_DEVNET_AIRDROP_LAMPORTS: ${SOLANA_DEVNET_AIRDROP_LAMPORTS:-10000000}
      # ── Circle API ────────────────────────────────────────────────────────
      CIRCLE_API_KEY: ${CIRCLE_API_KEY}
      CIRCLE_BASE_URL: ${CIRCLE_BASE_URL}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET}
      CIRCLE_WALLETS_BASE_URL: ${CIRCLE_WALLETS_BASE_URL}
      CIRCLE_TRANSFER_BLOCKCHAIN: ${CIRCLE_TRANSFER_BLOCKCHAIN}
      CIRCLE_TRANSFER_FEE_LEVEL: ${CIRCLE_TRANSFER_FEE_LEVEL}
      # ── Circle Wallets ────────────────────────────────────────────────────
      CIRCLE_WALLET_ID_ARC: ${CIRCLE_WALLET_ID_ARC}
      CIRCLE_WALLET_ID_SEPOLIA: ${CIRCLE_WALLET_ID_SEPOLIA}
      CIRCLE_WALLET_ID_SOLANA: ${CIRCLE_WALLET_ID_SOLANA}
      CIRCLE_WALLET_SET_ID_ARC: ${CIRCLE_WALLET_SET_ID_ARC}
      CIRCLE_WALLET_SET_ID_SEPOLIA: ${CIRCLE_WALLET_SET_ID_SEPOLIA}
      CIRCLE_WALLET_SET_ID_SOLANA: ${CIRCLE_WALLET_SET_ID_SOLANA}
      CIRCLE_WALLET_ADDRESS_ARC: ${CIRCLE_WALLET_ADDRESS_ARC}
      CIRCLE_WALLET_ADDRESS_SEPOLIA: ${CIRCLE_WALLET_ADDRESS_SEPOLIA}
      CIRCLE_WALLET_ADDRESS_SOLANA: ${CIRCLE_WALLET_ADDRESS_SOLANA}
      # ── Feature flags ────────────────────────────────────────────────────
      WIZPAY_BRIDGE_EXTERNAL_ENABLED: ${WIZPAY_BRIDGE_EXTERNAL_ENABLED:-false}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/tasks || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wizpay-network

  redis:
    image: redis:7-alpine
    container_name: wizpay-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - wizpay-network

  frontend:
    build:
      context: ./apps/frontend
      # ── Build-time args ───────────────────────────────────────────────────
      # docker-compose auto-loads the root .env file, so ${VAR} here resolves
      # from .env without any shell export. Values are baked into the Next.js
      # bundle during `npm run build` in the Dockerfile builder stage.
      #
      # To change a value: edit root .env, then rebuild with:
      #   docker compose down && docker compose up --build
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BACKEND_API_BASE_URL: ${NEXT_PUBLIC_BACKEND_API_BASE_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_CIRCLE_APP_ID: ${NEXT_PUBLIC_CIRCLE_APP_ID}
        NEXT_PUBLIC_CIRCLE_KIT_KEY: ${NEXT_PUBLIC_CIRCLE_KIT_KEY:-}
        NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY}
        NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL}
        NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ARC_TESTNET: ${NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ARC_TESTNET:-}
        NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ETH_SEPOLIA: ${NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ETH_SEPOLIA:-}
        NEXT_PUBLIC_CIRCLE_PASSKEY_RP_ID: ${NEXT_PUBLIC_CIRCLE_PASSKEY_RP_ID:-app.wizpay.xyz}
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URLS: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URLS:-}
        NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL:-}
        NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URLS: ${NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URLS:-}
        NEXT_PUBLIC_USE_REAL_STABLEFX: ${NEXT_PUBLIC_USE_REAL_STABLEFX:-false}
        NEXT_PUBLIC_CIRCLE_API_PROXY_ENABLED: ${NEXT_PUBLIC_CIRCLE_API_PROXY_ENABLED:-false}
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${NEXT_PUBLIC_CONTRACT_ADDRESS:-}
        NEXT_PUBLIC_WIZPAY_ADDRESS: ${NEXT_PUBLIC_WIZPAY_ADDRESS:-}
        NEXT_PUBLIC_WIZPAY_AGENTIC_NANO_ADDRESS: ${NEXT_PUBLIC_WIZPAY_AGENTIC_NANO_ADDRESS:-}
        # ── Feature flags (baked into Next.js bundle at build time) ───────────
        NEXT_PUBLIC_WIZPAY_BRIDGE_EXTERNAL_ENABLED: ${NEXT_PUBLIC_WIZPAY_BRIDGE_EXTERNAL_ENABLED:-false}
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      # ── Frontend runtime vars (Next.js dev server / SSR) ───────────────────
      # Keep these sourced from the root .env so docker-compose.dev does not
      # depend on apps/frontend/.env.local.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_BACKEND_API_BASE_URL: ${NEXT_PUBLIC_BACKEND_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_CIRCLE_APP_ID: ${NEXT_PUBLIC_CIRCLE_APP_ID:-}
      NEXT_PUBLIC_CIRCLE_KIT_KEY: ${NEXT_PUBLIC_CIRCLE_KIT_KEY:-}
      NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_KEY:-}
      NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL: ${NEXT_PUBLIC_CIRCLE_PASSKEY_CLIENT_URL:-https://modular-sdk.circle.com/v1/rpc/w3s/buidl}
      NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ARC_TESTNET: ${NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ARC_TESTNET:-}
      NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ETH_SEPOLIA: ${NEXT_PUBLIC_CIRCLE_PASSKEY_MODULAR_RPC_URL_ETH_SEPOLIA:-}
      NEXT_PUBLIC_CIRCLE_PASSKEY_RP_ID: ${NEXT_PUBLIC_CIRCLE_PASSKEY_RP_ID:-app.wizpay.xyz}
      NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-}
      NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-https://rpc.testnet.arc.network}
      NEXT_PUBLIC_ARC_TESTNET_RPC_URLS: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URLS:-}
      NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URLS: ${NEXT_PUBLIC_ETHEREUM_SEPOLIA_RPC_URLS:-}
      NEXT_PUBLIC_USE_REAL_STABLEFX: ${NEXT_PUBLIC_USE_REAL_STABLEFX:-false}
      NEXT_PUBLIC_CIRCLE_API_PROXY_ENABLED: ${NEXT_PUBLIC_CIRCLE_API_PROXY_ENABLED:-false}
      NEXT_PUBLIC_CONTRACT_ADDRESS: ${NEXT_PUBLIC_CONTRACT_ADDRESS:-}
      NEXT_PUBLIC_WIZPAY_ADDRESS: ${NEXT_PUBLIC_WIZPAY_ADDRESS:-}
      NEXT_PUBLIC_WIZPAY_AGENTIC_NANO_ADDRESS: ${NEXT_PUBLIC_WIZPAY_AGENTIC_NANO_ADDRESS:-}
      NEXT_PUBLIC_WIZPAY_BRIDGE_EXTERNAL_ENABLED: ${NEXT_PUBLIC_WIZPAY_BRIDGE_EXTERNAL_ENABLED:-false}
      # ── Server-side runtime vars (Next.js API routes, not bundled) ──────────
      # IMPORTANT: Add http://localhost:3000 to Circle Console → Allowed Origins
      CIRCLE_API_KEY: ${CIRCLE_API_KEY}
      CIRCLE_BASE_URL: ${CIRCLE_BASE_URL}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET}
      CIRCLE_WALLETS_BASE_URL: ${CIRCLE_WALLETS_BASE_URL}
      CIRCLE_TRANSFER_BLOCKCHAIN: ${CIRCLE_TRANSFER_BLOCKCHAIN}
      CIRCLE_TRANSFER_FEE_LEVEL: ${CIRCLE_TRANSFER_FEE_LEVEL}
      CIRCLE_BRIDGE_TRANSFER_SPEED: ${CIRCLE_BRIDGE_TRANSFER_SPEED}
      CIRCLE_BRIDGE_TRANSFER_TTL_SECONDS: ${CIRCLE_BRIDGE_TRANSFER_TTL_SECONDS:-1800}
      CIRCLE_WALLET_ID_ARC: ${CIRCLE_WALLET_ID_ARC}
      CIRCLE_WALLET_ID_SEPOLIA: ${CIRCLE_WALLET_ID_SEPOLIA}
      CIRCLE_WALLET_ID_SOLANA: ${CIRCLE_WALLET_ID_SOLANA}
      CIRCLE_WALLET_SET_ID_ARC: ${CIRCLE_WALLET_SET_ID_ARC}
      CIRCLE_WALLET_SET_ID_SEPOLIA: ${CIRCLE_WALLET_SET_ID_SEPOLIA}
      CIRCLE_WALLET_SET_ID_SOLANA: ${CIRCLE_WALLET_SET_ID_SOLANA}
      CIRCLE_WALLET_ADDRESS_ARC: ${CIRCLE_WALLET_ADDRESS_ARC}
      CIRCLE_WALLET_ADDRESS_SEPOLIA: ${CIRCLE_WALLET_ADDRESS_SEPOLIA}
      CIRCLE_WALLET_ADDRESS_SOLANA: ${CIRCLE_WALLET_ADDRESS_SOLANA}
      BRIDGE_DATABASE_URL: ${DATABASE_URL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - wizpay-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wizpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wizpay}
      POSTGRES_DB: ${POSTGRES_DB:-wizpay}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wizpay} -d ${POSTGRES_DB:-wizpay}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wizpay-network

networks:
  wizpay-network:
    driver: bridge

volumes:
  postgres_data: