services:
  backend:
    build: ./apps/backend
    env_file: .env
    depends_on:
      - postgres
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - wizpay-network

  frontend:
    build:
      context: ./apps/frontend
      args:
        DOCKER_BUILD: "true"
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${NEXT_PUBLIC_CONTRACT_ADDRESS}
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:4000
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-${RPC_URL}}
        NEXT_PUBLIC_ARC_TESTNET_RPC_URL: ${NEXT_PUBLIC_ARC_TESTNET_RPC_URL:-${RPC_URL}}
    env_file: .env
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:4000
    ports:
      - "3000:3000"
    networks:
      - wizpay-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: wizpay
      POSTGRES_PASSWORD: wizpay
      POSTGRES_DB: wizpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wizpay-network

networks:
  wizpay-network:
    driver: bridge

volumes:
  postgres_data: