services:
  frontend:
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/backend-legacy:/app
      - /app/node_modules