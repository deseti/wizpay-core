name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/backend/src/database/schema.prisma

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry libraries
        run: |
          rm -rf packages/contracts/lib/forge-std packages/contracts/lib/openzeppelin-contracts
          mkdir -p packages/contracts/lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std packages/contracts/lib/forge-std
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts packages/contracts/lib/openzeppelin-contracts
          test -f packages/contracts/lib/forge-std/src/Test.sol
          test -f packages/contracts/lib/openzeppelin-contracts/contracts/access/Ownable.sol

      - name: Run tests
        run: npm run test

      - name: Build workspace
        run: npm run build
